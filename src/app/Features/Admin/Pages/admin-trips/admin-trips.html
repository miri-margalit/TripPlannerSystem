<div class="page-header">
  <input
    type="text"
    class="search-input"
    placeholder="Search by trip name..."
    [ngModel]="searchTerm()"
    (ngModelChange)="searchTerm.set($event)"
  />
  <button class="add-btn" (click)="isAddOpen.set(true)">+ Add Trip</button>
</div>

@for (trip of filteredTrips(); track trip.id) {
  <app-admin-trip-card [trip]="trip"></app-admin-trip-card>
}

@if (isAddOpen()) {
  <div class="modal-overlay" (click)="isAddOpen.set(false)">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-admin-edit-form (closeForm)="isAddOpen.set(false)"></app-admin-edit-form>
    </div>
  </div>
}
